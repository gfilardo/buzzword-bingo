<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Buzzword Bingo</title>
    <meta name=viewport content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="styles.scss" />
    <script type="module" src="app.ts"></script>
  </head>
  <body>

    <div id="lobby">
      <h2>Buzzword Bingo</h2>
      <p class="lobby-tagline">Create a room, share the link with your colleagues, and mark off buzzwords as they fly. First to get five in a row wins — or at least has the most fun.</p>
      <div class="lobby-card">
        <label>
          Your name
          <input id="name-input" type="text" placeholder="e.g. Giovanni" autocomplete="off" />
        </label>
        <label>
          Room code
          <div class="room-code-row">
            <input id="room-input" type="text" placeholder="e.g. CONF-2026" autocomplete="off" />
            <button id="random-room-btn" type="button">Random</button>
          </div>
        </label>
        <label>
          Vocabulary
          <select id="vocab-select"></select>
        </label>
        <button id="play-btn" type="button">Play!</button>
        <p id="lobby-error" class="error"></p>
      </div>
    </div>

    <div id="game" hidden>
      <header class="game-header">
        <h2>Buzzword Bingo</h2>
        <div class="game-meta">
          <span id="room-label"></span>
          <span id="self-label"></span>
        </div>
      </header>
      <div class="share-row">
        Share link:
        <a id="share-link">
          <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="share-link-text"></span>
          <span id="share-link-copied" hidden>Copied!</span>
        </a>
      </div>
      <div id="game-layout">
        <div id="board"></div>
        <div id="scoreboard"></div>
      </div>
    </div>

  </body>
</html>
